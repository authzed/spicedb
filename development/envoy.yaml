---
static_resources:
  listeners:
    - name: "grpc_listener"
      address:
        socket_address:
          address: "0.0.0.0"
          port_value: 50051
      filter_chains:
        - filters:
            - name: "envoy.filters.network.http_connection_manager"
              typed_config:
                "@type": "type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager"
                codec_type: "HTTP2"
                stat_prefix: "grpc_ingress"
                http_filters:
                  - name: "envoy.filters.http.router"
                    typed_config:
                      "@type": "type.googleapis.com/envoy.extensions.filters.http.router.v3.Router"
                route_config:
                  name: "grpc_route"
                  virtual_hosts:
                    - name: "grpc_backend"
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/"
                          route:
                            cluster: "spicedb_grpc"

    - name: "http_listener"
      address:
        socket_address:
          address: "0.0.0.0"
          port_value: "8443"
      filter_chains:
        - filters:
            - name: "envoy.filters.network.http_connection_manager"
              typed_config:
                "@type": "type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager"
                codec_type: "HTTP1"
                stat_prefix: "http_ingress"
                http_filters:
                  - name: "envoy.filters.http.router"
                    typed_config:
                      "@type": "type.googleapis.com/envoy.extensions.filters.http.router.v3.Router"
                route_config:
                  name: "http_route"
                  virtual_hosts:
                    - name: "http_backend"
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/"
                          route:
                            cluster: "spicedb_http"

  clusters:
    - name: "spicedb_grpc"
      type: "STRICT_DNS"
      lb_policy: "ROUND_ROBIN"
      # Force HTTP/2 on the upstream so Envoy load-balances individual RPCs,
      # not connections (unlike nginx which balances at the connection level).
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": "type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions"
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: "spicedb_grpc"
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: "spicedb-1"
                      port_value: 50051
              - endpoint:
                  address:
                    socket_address:
                      address: "spicedb-2"
                      port_value: 50051

    - name: "spicedb_http"
      type: "STRICT_DNS"
      lb_policy: "ROUND_ROBIN"
      load_assignment:
        cluster_name: "spicedb_http"
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: "spicedb-1"
                      port_value: 8443
              - endpoint:
                  address:
                    socket_address:
                      address: "spicedb-2"
                      port_value: 8443
