syntax = "proto3";
package dispatch.v1;

import "buf/validate/validate.proto";
import "core/v1/core.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/authzed/spicedb/pkg/proto/dispatch/v1";

service DispatchService {
  rpc DispatchCheck(DispatchCheckRequest) returns (DispatchCheckResponse) {}
  rpc DispatchExpand(DispatchExpandRequest) returns (DispatchExpandResponse) {}

  rpc DispatchLookupSubjects(DispatchLookupSubjectsRequest) returns (stream DispatchLookupSubjectsResponse) {}
  rpc DispatchLookupResources2(DispatchLookupResources2Request) returns (stream DispatchLookupResources2Response) {}
  rpc DispatchLookupResources3(DispatchLookupResources3Request) returns (stream DispatchLookupResources3Response) {}

  rpc DispatchQueryPlan(DispatchQueryPlanRequest) returns (stream DispatchQueryPlanResponse) {}
}

message DispatchCheckRequest {
  enum DebugSetting {
    NO_DEBUG = 0;
    ENABLE_BASIC_DEBUGGING = 1;
    ENABLE_TRACE_DEBUGGING = 2;
  }

  enum ResultsSetting {
    REQUIRE_ALL_RESULTS = 0;
    ALLOW_SINGLE_RESULT = 1;
  }

  ResolverMeta metadata = 1 [(buf.validate.field).required = true];

  core.v1.RelationReference resource_relation = 2 [(buf.validate.field).required = true];
  repeated string resource_ids = 3;

  core.v1.ObjectAndRelation subject = 4 [(buf.validate.field).required = true];

  ResultsSetting results_setting = 5;

  DebugSetting debug = 6;

  /**
   * check_hints are hints provided to the check call to help the resolver optimize the check
   * by skipping calculations for the provided checks. The string key is the fully qualified
   * "relationtuple"-string for the problem, e.g. `document:example#relation@user:someuser`.
   * It is up to the caller to *ensure* that the hints provided are correct; if incorrect,
   * the resolver may return incorrect results which will in turn be cached.
   */
  repeated CheckHint check_hints = 7;
}

message CheckHint {
  core.v1.ObjectAndRelation resource = 1;
  core.v1.ObjectAndRelation subject = 2;
  string ttu_computed_userset_relation = 3;
  ResourceCheckResult result = 4;
}

message DispatchCheckResponse {
  ResponseMeta metadata = 1;
  map<string, ResourceCheckResult> results_by_resource_id = 2;
}

message ResourceCheckResult {
  enum Membership {
    UNKNOWN = 0;
    NOT_MEMBER = 1;
    MEMBER = 2;
    CAVEATED_MEMBER = 3;
  }

  Membership membership = 1;
  core.v1.CaveatExpression expression = 2;
  repeated string missing_expr_fields = 3;
}

message DispatchExpandRequest {
  enum ExpansionMode {
    SHALLOW = 0;
    RECURSIVE = 1;
  }

  ResolverMeta metadata = 1 [(buf.validate.field).required = true];

  core.v1.ObjectAndRelation resource_and_relation = 2 [(buf.validate.field).required = true];
  ExpansionMode expansion_mode = 3;
}

message DispatchExpandResponse {
  ResponseMeta metadata = 1;
  core.v1.RelationTupleTreeNode tree_node = 2;
}

message Cursor {
  reserved 1;
  repeated string sections = 2;
  uint32 dispatch_version = 3;
}

message DispatchLookupResources2Request {
  ResolverMeta metadata = 1 [(buf.validate.field).required = true];

  core.v1.RelationReference resource_relation = 2 [(buf.validate.field).required = true];
  core.v1.RelationReference subject_relation = 3 [(buf.validate.field).required = true];
  repeated string subject_ids = 4;

  core.v1.ObjectAndRelation terminal_subject = 5 [(buf.validate.field).required = true];
  google.protobuf.Struct context = 6;

  Cursor optional_cursor = 7;
  uint32 optional_limit = 8;

  // enable_debug_trace, when true, causes a LookupDebugTrace to be populated
  // on the response. Has zero runtime cost when false.
  bool enable_debug_trace = 9;
}

message PossibleResource {
  string resource_id = 1;
  repeated string for_subject_ids = 2;
  repeated string missing_context_params = 3;
}

message DispatchLookupResources2Response {
  PossibleResource resource = 1;
  ResponseMeta metadata = 2;
  Cursor after_response_cursor = 3;
}

message DispatchLookupResources3Request {
  ResolverMeta metadata = 1 [(buf.validate.field).required = true];

  core.v1.RelationReference resource_relation = 2 [(buf.validate.field).required = true];
  core.v1.RelationReference subject_relation = 3 [(buf.validate.field).required = true];
  repeated string subject_ids = 4;

  core.v1.ObjectAndRelation terminal_subject = 5 [(buf.validate.field).required = true];
  google.protobuf.Struct context = 6;

  repeated string optional_cursor = 7;
  uint32 optional_limit = 8;

  // enable_debug_trace, when true, causes a LookupDebugTrace to be populated
  // on the response. Has zero runtime cost when false.
  bool enable_debug_trace = 9;
}

message DispatchLookupResources3Response {
  repeated LR3Item items = 1;
}

message LR3Item {
  string resource_id = 1;
  repeated string for_subject_ids = 2;
  repeated string missing_context_params = 3;
  repeated string after_response_cursor_sections = 4;
}

message DispatchLookupSubjectsRequest {
  ResolverMeta metadata = 1 [(buf.validate.field).required = true];

  core.v1.RelationReference resource_relation = 2 [(buf.validate.field).required = true];
  repeated string resource_ids = 3;

  core.v1.RelationReference subject_relation = 4 [(buf.validate.field).required = true];
}

message FoundSubject {
  string subject_id = 1;
  core.v1.CaveatExpression caveat_expression = 2;
  repeated FoundSubject excluded_subjects = 3;
}

message FoundSubjects {
  repeated FoundSubject found_subjects = 1;
}

message DispatchLookupSubjectsResponse {
  map<string, FoundSubjects> found_subjects_by_resource_id = 1;
  ResponseMeta metadata = 2;
}

message ResolverMeta {
  string at_revision = 1;
  uint32 depth_remaining = 2 [(buf.validate.field).uint32.gt = 0];
  string request_id = 3 [deprecated = true];
  bytes traversal_bloom = 4 [(buf.validate.field).bytes = {max_len: 1024}];
  bytes schema_hash = 5;
}

message ResponseMeta {
  uint32 dispatch_count = 1;
  uint32 depth_required = 2;
  uint32 cached_dispatch_count = 3;

  reserved 4, 5;

  DebugInformation debug_info = 6;
}

message DebugInformation {
  CheckDebugTrace check = 1;
}

message CheckDebugTrace {
  enum RelationType {
    UNKNOWN = 0;
    RELATION = 1;
    PERMISSION = 2;
  }

  DispatchCheckRequest request = 1;
  RelationType resource_relation_type = 2;
  map<string, ResourceCheckResult> results = 3;
  bool is_cached_result = 4;
  repeated CheckDebugTrace sub_problems = 5;
  google.protobuf.Duration duration = 6;
  string trace_id = 7;
  string source_id = 8;
}

enum PlanOperation {
  PLAN_OPERATION_CHECK = 0;
  PLAN_OPERATION_LOOKUP_RESOURCES = 1;
  PLAN_OPERATION_LOOKUP_SUBJECTS = 2;
  // CHECK_MANY_RESOURCES: many = repeated resource ONRs, subject = single ONR.
  PLAN_OPERATION_CHECK_MANY_RESOURCES = 3;
  // CHECK_MANY_SUBJECTS: resource = single ONR, many = repeated subject ONRs.
  PLAN_OPERATION_CHECK_MANY_SUBJECTS = 4;
}

message PlanContext {
  string revision = 1;
  google.protobuf.Struct caveat_context = 2;
  int32 max_recursion_depth = 3;
  uint64 optional_datastore_limit = 4;
  bytes schema_hash = 5;
  // in_progress_keys are the dispatch canonical keys (\"def#rel\") that ancestors
  // of this dispatch are currently computing. The receiver-side DispatchExecutor
  // refuses to dispatch any alias whose key is in this set, falling back to local
  // execution. This is what breaks dispatch loops that arise when the standalone
  // plan for a key contains another structurally complete instance of itself
  // (cross-relation recursion the sentinel machinery can't see).
  repeated string in_progress_keys = 6;
  // top_level_operation carries the user-facing operation (Check / LookupSubjects
  // / LookupResources) that started the dispatch chain. The receiver pre-seals
  // its qctx with this value so iterators that consult TopLevelOperation (e.g.
  // AliasIterator.shouldIncludeSelfEdge) see the original API intent rather
  // than the per-hop dispatch op. Reuses PlanOperation so a single enum
  // describes both per-hop and user-facing operations; only CHECK,
  // LOOKUP_RESOURCES, and LOOKUP_SUBJECTS are valid here.
  PlanOperation top_level_operation = 7;
}

message DispatchQueryPlanRequest {
  PlanOperation operation = 1;
  string canonical_key = 2;
  // For CHECK_MANY_RESOURCES, resource is empty and `many` carries the resources.
  core.v1.ObjectAndRelation resource = 3;
  // For CHECK_MANY_SUBJECTS, subject is empty and `many` carries the subjects.
  core.v1.ObjectAndRelation subject = 4;
  PlanContext plan_context = 5;
  // many takes the place of resource or subject (whichever is empty), used by
  // PLAN_OPERATION_CHECK_MANY_RESOURCES and PLAN_OPERATION_CHECK_MANY_SUBJECTS.
  repeated core.v1.ObjectAndRelation many = 6;
}

message DispatchQueryPlanResponse {
  ResponseMeta metadata = 1;
  repeated ResultPath paths = 2;
}

message ResultPath {
  string resource_type = 1;
  string resource_id = 2;
  string relation = 3;
  string subject_type = 4;
  string subject_id = 5;
  string subject_relation = 6;
  core.v1.CaveatExpression caveat = 7;
  google.protobuf.Timestamp expiration = 8;
  repeated core.v1.RelationshipIntegrity integrity = 9;
  google.protobuf.Struct metadata = 10;
  repeated ResultPath excluded_subjects = 11;
}

message LookupDebugInfo {
  // The resource/relation pairs that have been positively identified as being
  // members of a cycle.
  repeated string cycle_members = 1;

  // The resource/relation pairs that may be members of a cycle.
  // TODO: split into a separate message? Avoid using proto altogether?
  repeated string cycle_candidates = 2;
}
