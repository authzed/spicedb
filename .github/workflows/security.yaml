# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
---
name: "Security"
on: # yamllint disable-line rule:truthy
  push:
    branches:
      - "!dependabot/*"
      - "main"
  pull_request:
    branches: ["*"]
  merge_group:
    types:
      - "checks_requested"
permissions:
  contents: "read"
env:
  DOCKERHUB_PUBLIC_ACCESS_TOKEN: "dckr_pat_8AEETZWxu8f7FvJUk9NrpyX_ZEQ"
  DOCKERHUB_PUBLIC_USER: "spicedbgithubactions"
concurrency:
  group: "spicedb-security-${{ github.event.pull_request.number }}"
  cancel-in-progress: true
jobs:
  codeql:
    name: "CodeQL Analyze"
    if: "${{ github.event_name == 'pull_request' }}" # workaround to https://github.com/github/codeql-action/issues/1537
    runs-on: "depot-ubuntu-24.04-8"
    permissions:
      # required for all workflows
      security-events: "write"

      # only required for workflows in private repositories
      actions: "read"
      contents: "read"

    steps:
      - uses: "actions/checkout@v6"
      - uses: "authzed/actions/setup-go@main"
      - uses: "authzed/actions/codeql@main"

  trivy:
    name: "Analyze Code and Docker Image with Trivvy"
    runs-on: "depot-ubuntu-24.04"
    steps:
      - uses: "actions/checkout@v6"
        with:
          # Only a single commit is fetched by default, for the ref/SHA that triggered the workflow. Set fetch-depth: 0
          # to fetch all history for all branches and tags. Refer here to learn which commit $GITHUB_SHA
          # points to for different events.
          #
          # this is used so goreleaser generates the right version out of the tags, which we need so that
          # trivy does not flag an old SpiceDB version
          fetch-depth: 0
      - uses: "authzed/actions/setup-go@main"
      - uses: "docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121" # v4.1.0
        with:
          username: "${{ env.DOCKERHUB_PUBLIC_USER }}"
          password: "${{ env.DOCKERHUB_PUBLIC_ACCESS_TOKEN }}"
      - name: "Install snapcraft"
        run: |
          sudo snap install snapcraft --channel=8.x/stable --classic
          mkdir -p $HOME/.cache/snapcraft/download
          mkdir -p $HOME/.cache/snapcraft/stage-packages
      - uses: "aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1" # For https://github.com/aquasecurity/trivy/security/advisories/GHSA-69fq-xp46-6x23
        #uses: "aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478" # master
        with:
          scan-type: "fs"
          ignore-unfixed: true
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH,MEDIUM"
          version: "v0.69.3"
        env:
          TRIVY_DB_REPOSITORY: "public.ecr.aws/aquasecurity/trivy-db"
          TRIVY_JAVA_DB_REPOSITORY: "public.ecr.aws/aquasecurity/trivy-java-db"
      - uses: "goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29" # v7.0.0
        id: "goreleaser"
        with:
          distribution: "goreleaser-pro"
          version: "2.3.2"
          args: "release --clean --split --snapshot --single-target"
        env:
          GORELEASER_KEY: "${{ secrets.GORELEASER_KEY }}"
      - name: "Obtain container image to scan"
        run: 'echo "IMAGE_VERSION=$(jq .version dist/linux_amd64_v1/metadata.json --raw-output)" >> $GITHUB_ENV'
      - name: "run trivy on release image"
        run: "docker run -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:0.69.3 image --format table --exit-code 1 --ignore-unfixed --vuln-type os,library --no-progress --severity CRITICAL,HIGH,MEDIUM authzed/spicedb:v${{ env.IMAGE_VERSION }}-amd64 --db-repository public.ecr.aws/aquasecurity/trivy-db --java-db-repository public.ecr.aws/aquasecurity/trivy-java-db"
