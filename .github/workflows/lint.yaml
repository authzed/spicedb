---
name: "Lint"
on: # yamllint disable-line rule:truthy
  push:
    branches:
      - "!dependabot/*"
      - "main"
  pull_request:
    branches: ["*"]
  merge_group:
    types:
      - "checks_requested"
permissions:
  contents: "read"
jobs:
  go-license-check:
    name: "License Check"
    runs-on: "depot-ubuntu-24.04-small"
    steps:
      - uses: "actions/checkout@v6"
      - uses: "authzed/actions/setup-go@main"
      - name: "Check Licenses"
        uses: "authzed/actions/go-license-check@11667c9b2e8b3649ad2af4d788e57d18f8e8eaf1" # main
        with:
          ignore: "buf.build" # Has no license information
  ensure-docs-uptodate:
    name: "Ensure Docs are up to date"
    runs-on: "depot-ubuntu-24.04-4"
    steps:
      - uses: "actions/checkout@v6"
      - uses: "authzed/actions/setup-go@main"
      - name: "Generate docs"
        run: "go run mage.go gen:docs"
      - uses: "chainguard-dev/actions/nodiff@18e5e3427cf9d6bcfbefe60dca48e40292f000c5" # main
        with:
          path: ""
          fixup-command: "mage gen:docs"
  lint-everything:
    name: "Lint Everything"
    runs-on: "depot-ubuntu-24.04-4"
    steps:
      - uses: "actions/checkout@v6"
      - uses: "authzed/actions/setup-go@main"
      - name: "Lint Everything"
        run: "go run mage.go lint:all"
      - uses: "chainguard-dev/actions/nodiff@18e5e3427cf9d6bcfbefe60dca48e40292f000c5" # main
        with:
          path: ""
          fixup-command: "go run mage.go lint:all"
