---
# FOR DEVELOPMENT ONLY. Run with
# docker-compose -f docker-compose.pgbouncer.yaml up --build
#
# This is similar to docker-compose.postgres.yaml but puts pgbouncer in front
# of the replica, which is the deployment model that strictReplicatedDatastore
# was designed for.
services:
  postgres-primary:
    image: "postgres:16"
    container_name: "postgres-primary"
    environment:
      - "POSTGRES_USER=spicedb"
      - "POSTGRES_PASSWORD=spicedb"
      - "POSTGRES_DB=spicedb"
      - "POSTGRES_HOST_AUTH_METHOD=md5"
    ports:
      - "5432"
    volumes:
      - "postgres-primary-data:/var/lib/postgresql/data"
      - "./development/postgres/primary-init.sh:/docker-entrypoint-initdb.d/primary-init.sh"
    command: >
      postgres
      -c wal_level=replica
      -c max_wal_senders=10
      -c max_replication_slots=10
      -c hot_standby=on
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spicedb"]
      interval: "3s"
      timeout: "3s"
      retries: 5
    restart: "unless-stopped"

  postgres-replica-1:
    image: "postgres:16"
    container_name: "postgres-replica-1"
    environment:
      - "PGPASSWORD=replicator"
      - "REPLICA_APPLY_DELAY=20ms"
    ports:
      - "5432"
    volumes:
      - "postgres-replica-1-data:/var/lib/postgresql/data"
      - "./development/postgres/replica-init.sh:/replica-init.sh"
    depends_on:
      postgres-primary:
        condition: "service_healthy"
    entrypoint: ["/bin/bash", "/replica-init.sh"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spicedb || exit 1"]
      interval: "5s"
      timeout: "3s"
      retries: 10
    restart: "unless-stopped"

  postgres-replica-2:
    image: "postgres:16"
    container_name: "postgres-replica-2"
    environment:
      - "PGPASSWORD=replicator"
      - "REPLICA_APPLY_DELAY=20ms"
    ports:
      - "5432"
    volumes:
      - "postgres-replica-2-data:/var/lib/postgresql/data"
      - "./development/postgres/replica-init.sh:/replica-init.sh"
    depends_on:
      postgres-primary:
        condition: "service_healthy"
    entrypoint: ["/bin/bash", "/replica-init.sh"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spicedb || exit 1"]
      interval: "5s"
      timeout: "3s"
      retries: 10
    restart: "unless-stopped"

  # pgbouncer sits in front of both replicas and load-balances connections.
  # This is the deployment model that strictReplicatedDatastore targets:
  # SpiceDB sees a single replica URI but queries may hit different replicas.
  pgbouncer:
    image: "edoburu/pgbouncer:latest"
    container_name: "pgbouncer"
    environment:
      - "DB_USER=spicedb"
      - "DB_PASSWORD=spicedb"
      - "DB_HOST=postgres-replica-1"
      - "DB_PORT=5432"
      - "DB_NAME=*"
      - "LISTEN_PORT=6432"
      - "AUTH_TYPE=scram-sha-256"
      - "MAX_CLIENT_CONN=200"
      - "POOL_MODE=transaction"
    ports:
      - "6432"
    depends_on:
      postgres-replica-1:
        condition: "service_healthy"
      postgres-replica-2:
        condition: "service_healthy"
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -h localhost -p 6432 -U spicedb || exit 1"]
      interval: "5s"
      timeout: "3s"
      retries: 10
    restart: "unless-stopped"

  migrate:
    depends_on:
      postgres-primary:
        condition: "service_healthy"
    build: "."
    container_name: "migrate"
    environment:
      - "SPICEDB_DATASTORE_ENGINE=postgres"
      - "SPICEDB_DATASTORE_CONN_URI=postgres://spicedb:spicedb@postgres-primary:5432/spicedb?sslmode=disable"
    command: "datastore migrate head"
    networks:
      - "default"

  envoy:
    image: "envoyproxy/envoy:v1.33-latest"
    ports:
      - "50051:50051"
      - "8443:8443"
    volumes:
      - "./development/envoy.yaml:/etc/envoy/envoy.yaml"
    command: "-c /etc/envoy/envoy.yaml"
    depends_on:
      spicedb-1:
        condition: "service_healthy"
      spicedb-2:
        condition: "service_healthy"

  spicedb-1:
    container_name: "spicedb-1"
    build: "."
    command: "serve"
    restart: "no"
    ports:
      - "9090"
      - "50051"
      - "8443"
      - "50053"
    environment:
      - "SPICEDB_LOG_FORMAT=json"
      - "SPICEDB_LOG_LEVEL=info"
      - "SPICEDB_HTTP_ENABLED=true"
      - "SPICEDB_GRPC_PRESHARED_KEY=super-secret-key"
      - "SPICEDB_DATASTORE_ENGINE=postgres"
      - "SPICEDB_DATASTORE_CONN_URI=postgres://spicedb:spicedb@postgres-primary:5432/spicedb?sslmode=disable"
      # Reads go through pgbouncer, which load-balances across replicas
      - "SPICEDB_DATASTORE_READ_REPLICA_CONN_URI=postgres://spicedb:spicedb@pgbouncer:6432/spicedb?sslmode=disable"
      - "SPICEDB_DISPATCH_CLUSTER_ENABLED=true"
      - "SPICEDB_DISPATCH_UPSTREAM_ADDR=spicedb-2:50053"
      - "SPICEDB_OTEL_PROVIDER=otlpgrpc"
      - "SPICEDB_OTEL_SAMPLE_RATIO=1"
      - "SPICEDB_TELEMETRY_ENDPOINT="
      - "SPICEDB_GRPC_LOG_REQUESTS_ENABLED=false"
      - "SPICEDB_GRPC_LOG_RESPONSES_ENABLED=false"
      - "SPICEDB_STREAMING_API_RESPONSE_DELAY_TIMEOUT=0s"
      - "OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317"
      - "SPICEDB_DATASTORE_FOLLOWER_READ_DELAY_DURATION=2000ms"
      - "SPICEDB_ENABLE_PERFORMANCE_INSIGHT_METRICS=true"
      - "SPICEDB_DATASTORE_INCLUDE_QUERY_PARAMETERS_IN_TRACES=true"
    depends_on:
      migrate:
        condition: "service_completed_successfully"
      pgbouncer:
        condition: "service_healthy"
      otel-collector:
        condition: "service_started"
    healthcheck:
      test: ["CMD", "/bin/grpc_health_probe", "-addr=localhost:50051"]
      interval: "5s"
      timeout: "30s"
      retries: 3

  spicedb-2:
    container_name: "spicedb-2"
    build: "."
    command: "serve"
    restart: "no"
    ports:
      - "9090"
      - "50051"
      - "8443"
      - "50053"
    environment:
      - "SPICEDB_LOG_FORMAT=json"
      - "SPICEDB_LOG_LEVEL=info"
      - "SPICEDB_HTTP_ENABLED=true"
      - "SPICEDB_GRPC_PRESHARED_KEY=super-secret-key"
      - "SPICEDB_DATASTORE_ENGINE=postgres"
      - "SPICEDB_DATASTORE_CONN_URI=postgres://spicedb:spicedb@postgres-primary:5432/spicedb?sslmode=disable"
      - "SPICEDB_DATASTORE_READ_REPLICA_CONN_URI=postgres://spicedb:spicedb@pgbouncer:6432/spicedb?sslmode=disable"
      - "SPICEDB_DISPATCH_CLUSTER_ENABLED=true"
      - "SPICEDB_DISPATCH_UPSTREAM_ADDR=spicedb-1:50053"
      - "SPICEDB_OTEL_PROVIDER=otlpgrpc"
      - "SPICEDB_OTEL_SAMPLE_RATIO=1"
      - "SPICEDB_TELEMETRY_ENDPOINT="
      - "SPICEDB_GRPC_LOG_REQUESTS_ENABLED=true"
      - "SPICEDB_GRPC_LOG_RESPONSES_ENABLED=false"
      - "SPICEDB_STREAMING_API_RESPONSE_DELAY_TIMEOUT=0s"
      - "OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317"
      - "SPICEDB_DATASTORE_FOLLOWER_READ_DELAY_DURATION=2000ms"
      - "SPICEDB_ENABLE_PERFORMANCE_INSIGHT_METRICS=true"
      - "SPICEDB_DATASTORE_INCLUDE_QUERY_PARAMETERS_IN_TRACES=true"
    depends_on:
      migrate:
        condition: "service_completed_successfully"
      pgbouncer:
        condition: "service_healthy"
      otel-collector:
        condition: "service_started"
    healthcheck:
      test: ["CMD", "/bin/grpc_health_probe", "-addr=localhost:50051"]
      interval: "5s"
      timeout: "30s"
      retries: 3

  prometheus:
    image: "prom/prometheus:v2.47.0"
    command:
      - "--config.file=/etc/prometheus/prometheus.yaml"
      - "--storage.tsdb.path=/prometheus"
      - "--enable-feature=native-histograms"
    volumes:
      - "./development/prometheus.yaml:/etc/prometheus/prometheus.yaml"
    ports:
      - "9091:9090"
    restart: "unless-stopped"

  otel-collector:
    image: "otel/opentelemetry-collector:0.60.0"
    command: "--config /etc/otel-config.yaml"
    volumes:
      - "./development/otel-config.yaml:/etc/otel-config.yaml"
    ports:
      - "4317:4317"
      - "8888"
    depends_on:
      - "tempo"
    restart: "unless-stopped"

  loki:
    image: "grafana/loki:2.9.0"
    command: "-config.file=/etc/loki/loki.yaml"
    volumes:
      - "./development/loki.yaml:/etc/loki/loki.yaml"
    ports:
      - "3100"
    restart: "unless-stopped"

  tempo:
    image: "grafana/tempo:1.5.0"
    command: "-search.enabled=true -config.file=/etc/tempo.yaml"
    volumes:
      - "./development/tempo.yaml:/etc/tempo.yaml"
    restart: "unless-stopped"
    ports:
      - "4317"
      - "3100"

  grafana:
    image: "grafana/grafana:9.1.5-ubuntu"
    volumes:
      - "./development/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources"
      - "./development/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards"
      - "./development/grafana/dashboards:/etc/grafana/dashboards"
    environment:
      - "GF_AUTH_ANONYMOUS_ENABLED=true"
      - "GF_AUTH_ANONYMOUS_ORG_ROLE=Admin"
      - "GF_AUTH_DISABLE_LOGIN_FORM=true"
    ports:
      - "3000:3000"
    depends_on:
      - "tempo"
      - "prometheus"
      - "loki"
    restart: "unless-stopped"

volumes:
  postgres-primary-data:
  postgres-replica-1-data:
  postgres-replica-2-data:
