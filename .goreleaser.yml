# yaml-language-server: $schema=https://goreleaser.com/static/schema-pro.json
---
version: 2
git:
  tag_sort: "-version:creatordate"
  prerelease_suffix: "-"
before:
  hooks:
    - "go run mage.go gen:completions"
    - "go run mage.go gen:manpages"
builds:
  - main: "./cmd/spicedb"
    env:
      - "CGO_ENABLED=0"
    goos:
      - "linux"
      - "darwin"
    goarch:
      - "amd64"
      - "arm64"
    mod_timestamp: "{{ .CommitTimestamp }}"
    tags:
      - "memoryprotection"
    ldflags:
      - "-s -w -checklinkname=0"
      - "-X github.com/jzelinskie/cobrautil/v2.Version=v{{ .Version }}"
archives:
  - files:
      - "README.md"
      - "LICENSE"
      - "completions/*"
      - "manpages/*"
nfpms:
  - vendor: "authzed inc."
    homepage: "https://spicedb.io"
    maintainer: "authzed <support@authzed.com>"
    description: "SpiceDB is a Zanzibar-inspired database that stores, computes, and validates application permissions."
    license: "Apache 2.0"
    epoch: "0"
    formats:
      - "apk"
      - "deb"
      - "rpm"
    contents:
      - src: "./completions/spicedb.bash"
        dst: "/usr/share/bash-completion/completions/spicedb"
        file_info:
          mode: 0644
      - src: "./completions/spicedb.fish"
        dst: "/usr/share/fish/vendor_completions.d/spicedb.fish"
        file_info:
          mode: 0644
      - src: "./completions/spicedb.zsh"
        dst: "/usr/share/zsh/vendor-completions/_spicedb"
        file_info:
          mode: 0644
      - src: "./manpages/spicedb.1"
        dst: "/usr/share/man/man1/spicedb.1"
        file_info:
          mode: 0644
gemfury:
  - account: "authzed"
    secret_name: "GEMFURY_PUSH_TOKEN"
    disable: "{{ gt (len .Prerelease) 0 }}"
snapcrafts:
  - name: "spicedb"
    publish: true
    summary: "A database that stores, computes, and validates application permissions"
    description: |
      SpiceDB is an open source, Google Zanzibar-inspired database for creating and managing security-critical application permissions.

      Developers create a schema and use client libraries to apply the schema to the database, insert relationships into the database, and query the database to efficiently check permissions in their applications.
    grade: "stable"
    confinement: "strict"
    license: "Apache-2.0"
    base: "core22"
    apps:
      spicedb:
        command: "spicedb"
        completer: "completions/spicedb.bash"
        plugs:
          - "network-bind"
          - "network"
homebrew_casks:
  - alternative_names:
      - "{{.ProjectName}}@{{.Version}}"
    description: "Google Zanzibar-inspired permissions database for fine-grained access control"
    homepage: "https://github.com/authzed/spicedb"
    url:
      template: "https://github.com/authzed/spicedb/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    completions:
      bash: "completions/spicedb.bash"
      zsh: "completions/spicedb.zsh"
      fish: "completions/spicedb.fish"
    manpages:
      - "manpages/spicedb.1"
    repository:
      owner: "authzed"
      name: "homebrew-tap"
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: "authzedbot"
      email: "infrastructure@authzed.com"
    commit_msg_template: "Brew cask update for {{ .ProjectName }} version {{ .Tag }}"
    skip_upload: "auto"
    # Our release binaries are not notarized, so macOS Gatekeeper quarantines
    # them on download and refuses to run them ("Apple could not verify spicedb
    # is free of malware"). Strip the quarantine attribute on install.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/spicedb"]
          end
dockers_v2:
  # Standard images
  - id: "standard"
    dockerfile: "Dockerfile.release"
    platforms:
      - "linux/amd64"
      - "linux/arm64"
    images:
      - "quay.io/authzed/spicedb{{ if .IsNightly }}-git{{ end }}"
      - "ghcr.io/authzed/spicedb{{ if .IsNightly }}-git{{ end }}"
      - "authzed/spicedb{{ if .IsNightly }}-git{{ end }}"
    tags:
      - "v{{ .Version }}"
      - "latest"
  # Debug images
  - id: "debug"
    dockerfile: "Dockerfile.release"
    platforms:
      - "linux/amd64"
      - "linux/arm64"
    images:
      - "quay.io/authzed/spicedb{{ if .IsNightly }}-git{{ end }}"
      - "ghcr.io/authzed/spicedb{{ if .IsNightly }}-git{{ end }}"
      - "authzed/spicedb{{ if .IsNightly }}-git{{ end }}"
    tags:
      - "v{{ .Version }}-debug"
      - "latest-debug"
    build_args:
      BASE: "cgr.dev/chainguard/busybox"
checksum:
  name_template: "checksums.txt"
snapshot:
  version_template: "{{ incpatch .Version }}-next"
changelog:
  use: "github-native"
  sort: "asc"
nightly:
  version_template: "{{ incpatch .Version }}-{{ .ShortCommit }}"
release:
  draft: false
  prerelease: "auto"
  mode: "append"
  footer: |
    ## Docker Images
    This release is available at `authzed/spicedb:v{{ .Version }}`, `quay.io/authzed/spicedb:v{{ .Version }}`, `ghcr.io/authzed/spicedb:v{{ .Version }}`
